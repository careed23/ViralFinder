version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viralfinder-backend
    ports:
      - "8000:8000"
    environment:
      - PRODUCTHUNT_API_TOKEN=${PRODUCTHUNT_API_TOKEN}
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - viralfinder-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: viralfinder-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - viralfinder-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  viralfinder-network:
    driver: bridge
